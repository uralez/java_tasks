<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Регистрация - job-pilot')}"></head>
<body class="auth-page">

<div th:replace="~{fragments/topbar :: topbar('/register')}"></div>

<div class="auth-page-content">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <svg th:replace="~{fragments/icons :: briefcase}"></svg>
            </div>
            <h1 class="auth-title">Регистрация в job-pilot</h1>
            <p class="auth-subtitle">Создайте аккаунт за минуту</p>
        </div>

        <div th:if="${param.error}" class="auth-error">
            Не удалось зарегистрироваться. Проверьте данные.
        </div>

        <form th:action="@{/register}" method="post">
            <label class="auth-label">Имя</label>
            <input class="auth-input" type="text" name="name" placeholder="Ваше имя" required/>

            <label class="auth-label">Email</label>
            <input class="auth-input" type="email" name="email" placeholder="you@example.com" required/>

            <label class="auth-label">Логин</label>
            <input class="auth-input" type="text" name="login" placeholder="your.login" required/>

            <label class="auth-label">Пароль</label>
            <input class="auth-input" type="password" name="password" placeholder="••••••••" required/>

            <button class="auth-button" type="submit">Зарегистрироваться</button>
        </form>

        <div class="auth-divider">
            <div class="auth-divider-line"></div>
            <span class="auth-divider-text">или</span>
            <div class="auth-divider-line"></div>
        </div>

        <p class="auth-footer">
            Уже есть аккаунт? <a class="auth-link" th:href="@{/login}">Войти</a>
        </p>
    </div>
</div>

</body>
</html>
