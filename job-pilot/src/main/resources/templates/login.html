<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Вход - job-pilot')}"></head>
<body class="auth-page">

<div th:replace="~{fragments/topbar :: topbar('/login')}"></div>

<div class="auth-page-content">
    <div class="auth-card">
        <div class="auth-header">
            <div class="auth-logo">
                <svg th:replace="~{fragments/icons :: briefcase}"></svg>
            </div>
            <h1 class="auth-title">Вход в job-pilot</h1>
            <p class="auth-subtitle">Найдём вашу следующую работу</p>
        </div>

        <div th:if="${param.error}" class="auth-error">
            Неверный логин или пароль
        </div>

        <form th:action="@{/login}" method="post">
            <label class="auth-label">Логин</label>
            <input class="auth-input" type="text" name="username" placeholder="your.login" required/>

            <label class="auth-label">Пароль</label>
            <input class="auth-input" type="password" name="password" placeholder="********" required/>

            <button class="auth-button" type="submit">Войти</button>
        </form>

        <div class="auth-divider">
            <div class="auth-divider-line"></div>
            <span class="auth-divider-text">или</span>
            <div class="auth-divider-line"></div>
        </div>

        <p class="auth-footer">
            Нет аккаунта? <a class="auth-link" th:href="@{/register}">Зарегистрироваться</a>
        </p>
    </div>


</div>
</body>
</html>
