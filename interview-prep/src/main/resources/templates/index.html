<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Interview Preparation</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body class="page-index">
<div class="page">

    <div class="topbar">
        <div class="brand" th:text="#{topbar.brand}">Interview Prep</div>
        <div class="topbar-user">
            <span class="topbar-name" th:text="${#authentication.principal.name}"></span>
            <span class="topbar-role" th:text="${#authentication.principal.role}"></span>
        </div>
        <div class="lang-switcher">
            <a th:href="@{/(lang=en)}" th:text="#{lang.en}"></a>
            <a th:href="@{/(lang=de)}" th:text="#{lang.de}"></a>
            <a th:href="@{/(lang=ru)}" th:text="#{lang.ru}"></a>
        </div>
        <form th:action="@{/logout}" method="post">
            <button class="btn-logout" type="submit" th:text="#{topbar.logout}">Log out</button>
        </form>
    </div>

    <div class="welcome">
        <h1><span th:text="#{welcome.title}">Hello, </span><span th:text="${#authentication.name}">студент</span></h1>
        <p class="subtitle" th:text="#{welcome.subtitle}">Продолжайте практику &mdash; каждый ответ приближает вас к цели</p>
    </div>

    <div class="grid">
        <div class="panel">
            <div class="panel-title" th:text="#{panel.myTopics}">My Topics</div>
            <div th:if="${#lists.isEmpty(topicStats)}" class="panel-desc" th:text="#{panel.noAnswers}">
                Ответов пока нет. Зарегистрируйте первый ответ.
            </div>
            <table th:if="${!#lists.isEmpty(topicStats)}" class="stats-table">
                <thead>
                    <tr>
                        <th th:text="#{panel.topics.topic}">Topic</th>
                        <th th:text="#{panel.topics.count}">Answers</th>
                        <th th:text="#{panel.topics.avg}">Average Grade</th>
                    </tr>
                </thead>
                <tbody>
                    <th:block th:each="stat : ${topicStats}">
                        <tr class="topic-row" th:attr="data-topic=${stat.topicName}">
                            <td th:text="${stat.topicName}"></td>
                            <td th:text="${stat.answerCount}"></td>
                            <td th:text="${#numbers.formatDecimal(stat.avgGrade, 1, 1)}"></td>
                        </tr>
                        <tr class="questions-row" th:attr="data-topic=${stat.topicName}" style="display:none;">
                            <td colspan="3">
                                <ul class="questions-list">
                                    <li th:each="q : ${stat.questions}"
                                        th:text="${q.text}"
                                        th:attr="data-id=${q.id}, data-topic=${stat.topicName}"
                                        class="question-item"></li>
                                </ul>
                            </td>
                        </tr>
                    </th:block>
                </tbody>
            </table>
        </div>

        <div class="panel">
            <div class="panel-title" th:text="#{panel.gradeChart}">Grade Dynamics</div>
            <canvas id="gradeChart"></canvas>
        </div>

        <div class="panel wide">
            <div class="panel-title" th:text="#{panel.registerAnswer}">Register Answer</div>

            <form th:action="@{/answer}" method="post">

                <div class="field">
                    <div class="field-label-row">
                        <label for="topicId" th:text="#{form.topic}">Topic</label>
                    </div>
                    <select id="topicId" name="topicId" class="field-select">
                        <option value="" th:text="#{form.topic.placeholder}">- select topic -</option>
                        <option th:each="topic : ${topics}"
                                th:value="${topic.id}"
                                th:text="${topic.name}"></option>
                    </select>
                </div>

                <div class="field">
                    <div class="field-label-row">
                        <label for="questionId" th:text="#{form.question}">Question</label>
                    </div>
                    <select id="questionId" name="questionId" class="field-select">
                        <option value="" th:text="#{form.question.placeholder}">- select topic first -</option>
                    </select>
                </div>

                <div class="field">
                    <div class="field-label-row">
                        <label for="text" th:text="#{form.answer}">Answer</label>
                    </div>
                    <textarea id="text" name="text" class="field-textarea" th:placeholder="#{form.answer.placeholder}"></textarea>
                </div>

                <div class="field">
                    <div class="field-label-row">
                        <label for="grade" th:text="#{form.grade}">Grade (1.0 - 5.0)</label>
                    </div>
                    <input id="grade" type="number" name="grade" class="field-input" min="1" max="5" step="0.1" th:placeholder="#{form.grade.placeholder}"/>
                </div>

                <div class="field">
                    <div class="field-label-row">
                        <label for="evaluatorId" th:text="#{form.evaluator}">Evaluator</label>
                    </div>
                    <select id="evaluatorId" name="evaluatorId" class="field-select">
                        <option value="" th:text="#{form.evaluator.placeholder}">- select evaluator -</option>
                        <option th:each="evaluator : ${evaluators}"
                                th:value="${evaluator.id}"
                                th:text="${evaluator.name}"></option>
                    </select>
                </div>

                <div class="field">
                    <div class="field-label-row">
                        <label for="answerDate" th:text="#{form.date}">Answer Date</label>
                    </div>
                    <input id="answerDate" type="date" name="answerDate" class="field-input" th:value="${today}"/>
                </div>

                <button class="btn" type="submit" th:text="#{form.submit}">Save Answer</button>
            </form>
        </div>

    </div>

    <div class="time">
        <span th:text="${currentTime}"></span>
    </div>

</div>

<script th:inline="javascript">
    const i18n = {
        selectQuestion: /*[[#{form.question.placeholder}]]*/    '- select question -'   ,
        selectTopic: /*[[#{form.topic.placeholder}]]*/          '- select topic -'      ,
        validation: {
            topicRequired:      /*[[#{validation.topic.required}]]*/    'Please select a topic.'        ,
            questionRequired:   /*[[#{validation.question.required}]]*/ 'Please select a question.'     ,
            textRequired:       /*[[#{validation.text.required}]]*/     'Please enter your answer.'     ,
            evaluatorRequired:  /*[[#{validation.evaluator.required}]]*/'Please select an evaluator.'   ,
            dateRequired:       /*[[#{validation.date.required}]]*/      'Please select a date.'         ,
            gradeInvalid:       /*[[#{validation.grade.invalid}]]*/     'Grade must be between 1 and 5.'
        }
    };
</script>
<script th:src="@{/js/main.js}"></script>
</body>
</html>
