<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{login.title}">Login - Interview Prep</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Nunito:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
</head>
<body>
<div class="card">
    <div class="brand" th:text="#{topbar.brand}">Interview Prep</div>

    <div class="lang-switcher">
        <a th:href="@{/login(lang=en)}" th:text="#{lang.en}"></a>
        <a th:href="@{/login(lang=de)}" th:text="#{lang.de}"></a>
        <a th:href="@{/login(lang=ru)}" th:text="#{lang.ru}"></a>
    </div>

    <h1 th:text="#{login.welcome}">Welcome</h1>
    <p class="subtitle" th:text="#{login.subtitle}">Sign in to continue</p>

    <div th:if="${param.error}" class="alert alert-error" th:text="#{login.error}">
        Invalid login or password
    </div>
    <div th:if="${param.logout}" class="alert alert-success" th:text="#{login.logout}">
        You have been logged out
    </div>

    <form th:action="@{/login}" method="post">

        <div class="field">
            <div class="field-label-row">
                <label for="username" th:text="#{login.username}">Login</label>
            </div>
            <input id="username" type="text" name="username" th:placeholder="#{login.username.placeholder}" autocomplete="username"/>
        </div>

        <div class="field">
            <div class="field-label-row">
                <label for="password" th:text="#{login.password}">Password</label>
            </div>
            <input id="password" type="password" name="password" th:placeholder="#{login.password.placeholder}" autocomplete="current-password"/>
        </div>

        <button class="btn" type="submit" th:text="#{login.submit}">Login →</button>
    </form>

    <div class="footer-link">
        <form th:action="@{/demo/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="btn" type="submit" th:text="#{login.demoButton}">Login as Guest</button>
        </form>
    </div>

    <div class="footer-link">
        <span th:text="#{login.noAccount}">No account?</span> <a th:href="@{/register}" th:text="#{login.register}">Register</a>
    </div>

</div>
</body>
</html>
